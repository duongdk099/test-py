name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  backend-ci:
    name: Backend checks
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
          POSTGRES_DB: meteodb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DEBUG: "false"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run tests
        run: uv run pytest -vv

      - name: Run linter
        run: uv run ruff check .

      - name: Run security scan
        run: uvx --with bandit bandit -r config weather -x weather/tests -s B311 -q

      - name: Run Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  docker:
    name: Docker build and publish
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
